<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RecruitPro — Create Job Requirement</title>
  <meta name="description" content="Create a new job requirement in RecruitPro" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/forms.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- Sidebar -->
  <aside class="sidebar" role="navigation" aria-label="Main Navigation">
    <div class="sidebar-logo">
      <div class="logo-text">
        <span class="logo-icon">💼</span> RecruitPro
      </div>
      <div class="logo-sub">Recruitment Management</div>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" id="nav-dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="create-job.html" class="active" id="nav-create">
        <span class="nav-icon">➕</span> Create Job
      </a>
      <a href="update-job.html" id="nav-update">
        <span class="nav-icon">✏️</span> Update Job
      </a>
      <a href="add-candidate.html" id="nav-candidate">
        <span class="nav-icon">👤</span> Add Candidate
      </a>
      <a href="#" id="logout-btn">
        <span class="nav-icon">🚪</span> Logout
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <span class="user-name" id="sidebar-user-name">—</span>
        <span class="user-role-badge" id="sidebar-user-role">—</span>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <div id="toast-container" aria-live="polite"></div>

    <div class="page-header">
      <h1>Create Job Requirement</h1>
      <p>UC 6.1 — Fill in all required fields to post a new job opening.</p>
    </div>

    <div class="card">
      <div class="card-title">
        <span class="card-title-icon">📋</span> Job Details
      </div>

      <form id="create-job-form" novalidate>
        <div class="form-grid">

          <div class="form-group">
            <label for="date">Date <span style="color:var(--error)">*</span></label>
            <input type="date" id="date" name="date" required />
          </div>

          <div class="form-group">
            <label for="company_name">Company Name <span style="color:var(--error)">*</span></label>
            <input type="text" id="company_name" name="company_name" placeholder="e.g. TechNova Solutions" required />
          </div>

          <div class="form-group">
            <label for="job_title">Job Title <span style="color:var(--error)">*</span></label>
            <input type="text" id="job_title" name="job_title" placeholder="e.g. Senior Backend Engineer" required />
          </div>

          <div class="form-group">
            <label for="num_candidates_required">Number of Candidates <span style="color:var(--error)">*</span></label>
            <input type="number" id="num_candidates_required" name="num_candidates_required" min="1" placeholder="e.g. 3" required />
          </div>

          <div class="form-group">
            <label for="experience">Experience</label>
            <input type="text" id="experience" name="experience" placeholder="e.g. 3-5 years" />
          </div>

          <div class="form-group">
            <label for="budgeted_package">Budgeted Package</label>
            <input type="text" id="budgeted_package" name="budgeted_package" placeholder="e.g. 8-12 LPA" />
          </div>

          <div class="form-group">
            <label for="assigned_recruiter_name">Assigned Recruiter</label>
            <input type="text" id="assigned_recruiter_name" name="assigned_recruiter_name" placeholder="e.g. Sam Rivera" />
          </div>

          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn-primary">
              💾 Save Job Requirement
            </button>
            <button type="button" id="reset-btn" class="btn-reset">Reset</button>
          </div>

        </div><!-- /.form-grid -->
      </form>
    </div><!-- /.card -->

  </main>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/create-job.js"></script>
</body>
</html>
